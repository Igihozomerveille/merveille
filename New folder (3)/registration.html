<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("house.jpg");
    background-size: cover;
    background-position: center;
}

/* NAVBAR */
.navbar {
    background-color: #ff6f91;
    padding: 15px;
    display: flex;
    justify-content: center;
    gap: 25px;
}

.navbar a {
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.navbar a:hover {
    color: #222;
}

/* FORM BOX (different style for registration) */
.form-container {
    width: 380px;
    margin: 80px auto;
    padding: 35px;
    background: linear-gradient(145deg, rgba(255,255,255,0.95), rgba(240,240,240,0.95));
    border-radius: 15px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.4);
    text-align: center;
    border-left: 8px solid #ff8c00; /* orange accent for register */
}

.form-container h2 {
    margin-bottom: 22px;
    color: #ff8c00; /* accent color */
    font-family: 'Arial Black', sans-serif;
}

/* INPUT */
input {
    width: 95%;
    padding: 12px;
    margin-top: 14px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

input:focus {
    border-color: #ff8c00;
    box-shadow: 0 0 8px #ff8c00;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    margin-top: 20px;
    background: linear-gradient(to right, #ff8c00, #ffb347);
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: linear-gradient(to right, #ffb347, #ff8c00);
}

/* EXTRA */
.extra {
    margin-top: 18px;
    font-size: 14px;
}

.extra a {
    color: #ff8c00;
    text-decoration: none;
    font-weight: bold;
}

.extra a:hover {
    text-decoration: underline;
}

/* FOOTER */
.footer {
    text-align: center;
    color: white;
    margin-top: 50px;
    font-size: 14px;
}
</style>

</head>

<body>

<nav class="navbar">
    <a href="home.html">Home</a>
    <a href="registration.html">Registration</a>
    <a href="gallery.html">Gallery</a>
    <a href="login.html">Form</a>
    <a href="about.html">About</a>
</nav>

<div class="form-container">
<h2>Create Your Account</h2>

<form>
    <input type="text" placeholder="Full Name" required>
    <input type="email" placeholder="Email Address" required>
    <input type="password" placeholder="Password" required>
    <input type="password" placeholder="Confirm Password" required>

    <button type="submit">Register</button>
</form>

<div class="extra">
    Already have an account? <a href="login.html">Login</a>
</div>
</div>

<div class="footer">
  <p>© 2026 My First Website | Crafted with ❤️</p>
  <p>Current Time: <span id="time"></span></p>
</div>

<script>
function updateTime() {
    const now = new Date();
    document.getElementById("time").innerHTML = now.toLocaleTimeString();
}

setInterval(updateTime, 1000);
updateTime();
</script>

</body>
</html>
