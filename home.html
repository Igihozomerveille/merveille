<html lang="en">
<head>
<meta charset="UTF-8">
<title>My First Website</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)),
  url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');
  background-size:cover;
  background-position:center;
}

/* NAVBAR */
.navbar{
  background:#00c9a7;
  padding:15px;
  text-align:center;
}

.navbar a{
  color:white;
  margin:15px;
  text-decoration:none;
  font-weight:bold;
  transition:0.3s;
}

.navbar a:hover{
  color:#111;
}

/* HERO */
.hero{
  text-align:center;
  color:white;
  padding:120px 20px;
}

.hero h1{
  font-size:48px;
  margin-bottom:10px;
  letter-spacing:1px;
}

.hero p{
  font-size:20px;
  max-width:600px;
  margin:auto;
  line-height:1.6;
  opacity:0.9;
}

.btn{
  display:inline-block;
  margin-top:25px;
  background:#00c9a7;
  color:white;
  padding:12px 30px;
  text-decoration:none;
  border-radius:6px;
  font-weight:bold;
}

.btn:hover{
  background:#00a98b;
}

/* FEATURES */
.features{
  background:pink;
  text-align:center;
  padding:60px 20px;
}

.features h2{
  font-size:30px;
  margin-bottom:10px;
}

/* FOOTER */
.footer{
  text-align:center;
  background:#111;
  color:white;
  padding:15px;
  font-size:14px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <a href="home.html">Home</a>
  <a href="registration.html">Registration</a>
  <a href="gallery.html">Gallery</a>
  <a href="login.html">Form</a>
  <a href="about.html">About</a>
</div>

<!-- HERO SECTION -->
<div class="hero">
  <h1>Welcome</h1>
  <p>
    Build ideas, explore creativity, and grow your skills with a simple and modern website.
  </p>

  <a href="registration.html" class="btn">Get Started</a>
</div>

<!-- FEATURES -->
<div class="features">
  <h2>What You Can Do</h2>
  <p>Learn, explore, and create</p>
</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 My Website | Clean & Simple Design
</div>

</body>
</html>
